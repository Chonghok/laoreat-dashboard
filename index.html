<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaorEat Admin Dashboard</title>
    <script>
        (function () {
            const saved = localStorage.getItem("theme") || "light";
            document.documentElement.dataset.theme = saved;
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="sidebar">
        <h1 class="menu-logo">LaorEat</h1>
        <ul>
            <li id="liDashboard"><a id="navDashboard" class="active" href=""><i class="bi bi-grid-fill"></i>Dashboard</a></li>
            <li id="liOrders"><a id="navOrders" href=""><i class="ri-file-list-fill"></i>Orders</a></li>
            <li id="liProducts"><a id="navProducts" href="products.html"><i class="bi bi-fork-knife"></i>Products</a></li>
            <li id="liReviews"><a id="navReviews" href=""><i class="ri-message-3-line"></i>Reviews</a></li>
            <li id="liCategories"><a id="navCategories" href=""><i class="ri-menu-search-line"></i>Categories</a></li>
            <li id="liPromotions"><a id="navPromotions" href=""><i class="ri-coupon-2-fill"></i>Promotions</a></li>
            <li id="liDelivery"><a id="navDelivery" href=""><i class="ri-takeaway-fill"></i>Delivery</a></li>
            <li id="liCustomers"><a id="navCustomers" href=""><i class="ri-user-fill"></i>Customers</a></li>
            <li id="liPayments"><a id="navPayments" href=""><i class="ri-bank-card-fill"></i>Payments</a></li>
            <li id="liAdmins"><a id="navAdmins" href="admins.html"><i class="ri-shield-user-fill"></i>Admins</a></li> 
        </ul>
        <div class="admin-profile-container" id="profileMenu">
            <div class="profile-left">
                <div class="profile-image">
                    <img id="sidebarProfileImage" src="assets/images/default-user.webp" alt="">
                </div>
                <div class="profile-details">
                    <h4 id="sidebarUsername">Admin</h4>
                    <p id="sidebarRole">Role</p>
                </div>
            </div>
            <div class="dropdown-arrow" id="profileToggle">
                <i class="ri-arrow-down-s-line"></i>
            </div>

            <div class="profile-dropdown" id="profileDropdown">
                <div class="dropdown-item" id="toggleTheme">
                    <i class="ri-moon-line"></i> Dark Mode
                </div>
                <div class="dropdown-divider"></div>
                <div class="dropdown-item logout-item" id="logoutBtn">
                    <i class="ri-logout-circle-r-line"></i> Logout
                </div>
            </div>
        </div>
    </div>

    <!-- Scrollable Content -->
    <main class="main-content">
        <h1>Dashboard</h1>

        <!-- Demo content -->
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </main>

<script src="assets/js/config.js"></script>
<script src="assets/js/script.js"></script>
</body>
</html>
